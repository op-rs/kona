name: Kurtosis E2E Tests
on:
  push:
    branches: [main]
  merge_group:
  pull_request:
env:
  CARGO_TERM_COLOR: always
jobs:
  simple-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    name: simple-e2e-tests
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false
      - uses: taiki-e/install-action@just
      - name: Setup Go 1.24.3
        uses: actions/setup-go@v5
        with:
          # Semantic version range syntax or exact version of Go
          go-version: '1.24.3'
      - uses: jdx/mise-action@v2       # installs Mise + runs `mise install`
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - uses: docker/setup-buildx-action@v3
      - name: Build kona node docker image
        uses: docker/bake-action@v6
        env:
          BIN_TARGET: kona-node
          BUILD_PROFILE: release
          REPO_LOCATION: local
          PLATFORMS: linux/${{ runner.arch == 'X64' && 'amd64' || runner.arch == 'ARM64' && 'arm64' || runner.arch }}
        with:
          files: |
            ./docker/docker-bake.hcl
          push: true
          load: true
          context: .
          targets: |
            generic
          set: |
            *.tags=kona-node:local
            *.cache-from=type=gha
            *.cache-to=type=gha,mode=max
      - name: test with simple-kona devnet
        run: just deploy-devnet-and-test-e2e simple-kona node
  large-e2e-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 40
    name: large-e2e-tests
    steps:
      - name: Checkout sources
        uses: actions/checkout@v4
        with:
          submodules: true
      - name: Free Disk Space (Ubuntu)
        uses: jlumbroso/free-disk-space@main
        with:
          large-packages: false
      - uses: taiki-e/install-action@just
      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
      - name: Setup Go 1.24.3
        uses: actions/setup-go@v5
        with:
          # Semantic version range syntax or exact version of Go
          go-version: '1.24.3'
      - uses: jdx/mise-action@v2       # installs Mise + runs `mise install`
      - name: test with large-kona devnet
        run: just build-devnet-and-test-e2e large-kona node
