# Use the shared network across all stacks
networks:
  stf-net:
    external: true

services:

  op-rs-op-sepolia-reth:
    container_name: reth
    build:
      context: .
      dockerfile: op-reth/op-reth.dockerfile
    ports:
      - "9430:9430" # metrics
      - "30333:30333/tcp" # eth/66 peering
      - "30333:30333/udp" # eth/66 peering
      - "8200:8200" # rpc
      - "8201:8201" # engine
    volumes:
      - "./datadirs/reth-2:/db"
    networks:
      - stf-net

  op-rs-op-sepolia-kona-node:
    container_name: kona
    env_file:
      - path: default.env
      - path: op-rs-box1.env
      - path: override.env
        required: false
    build:
      context: .
      dockerfile: kona-node/kona-node.dockerfile
    ports:
      - "9223:9223/tcp" # p2p
      - "9223:9223/udp" # p2p
      - "9431:9431" # metrics
      - "5060:5060" # rpc
    volumes:
      - "./datadirs/kona-node:/db"
    networks:
      - stf-net
    depends_on:
      - op-rs-op-sepolia-reth

  op-rs-grafana:
    container_name: grafana










